<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        .message-card {
            width: 420px;
            padding: 35px;
            border-radius: 25px;
            text-align: center;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        .message-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .message-card h2 {
            margin-bottom: 10px;
        }

        .message-card p {
            color: #dbeafe;
            line-height: 1.6;
        }

        @media screen and (max-width: 768px) {
            .message-card {
                width: 88%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="message-card">

    <div class="message-icon">
        ℹ️
    </div>

    <h2>{{ title }}</h2>

    <p>{{ message }}</p>

    <a href="{{ link }}" class="btn">
        {{ button }}
    </a>

</div>

</body>
</html>
