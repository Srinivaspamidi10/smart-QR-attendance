<!DOCTYPE html>
<html>
<head>
    <title>Submit Attendance</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
        }

        .attendance-wrapper{
            width:95%;
            max-width:700px;
            margin:auto;
        }

        .attendance-card{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            border-radius:25px;
            padding:30px;
            text-align:center;
            box-shadow:0 15px 45px rgba(0,0,0,0.4);
        }

        .status-box{
            background:rgba(255,255,255,0.10);
            padding:18px;
            border-radius:18px;
            margin-top:20px;
        }

        .status{
            font-weight:bold;
            margin-top:10px;
        }

        .success{
            color:#00ff99;
        }

        .error{
            color:#ff4d4d;
        }

        .error-alert{
            background:#fee2e2;
            color:#991b1b;
            padding:15px;
            border-radius:15px;
            margin:15px 0;
            font-weight:bold;
            box-shadow:0 8px 25px rgba(0,0,0,0.25);
        }

        #submitBtn{
            opacity:0.5;
            pointer-events:none;
        }

        @media screen and (max-width:768px){
            .attendance-card{
                padding:20px;
            }
        }
    </style>
</head>

<body>

<div class="attendance-wrapper">

    <div class="attendance-card">

        <h1>🎓 Submit Attendance</h1>

        <p>
            Tap below to verify your classroom location.
        </p>

        <h3 id="timer"></h3>

        {% if error %}
        <div class="error-alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="status-box">

                <h3>Verification Status</h3>

                <p id="locationStatus"
                   class="status error">
                    📍 Location not captured
                </p>

            </div>

            <input type="hidden"
                   name="student_latitude"
                   id="student_latitude">

            <input type="hidden"
                   name="student_longitude"
                   id="student_longitude">

            <br>

            <button type="button"
                    onclick="captureLocation()">
                📍 Allow / Capture Location
            </button>

            <br><br>

            {% if not hide_submit %}
            <button type="submit"
                    id="submitBtn">
                Submit Attendance
            </button>
            {% endif %}

        </form>

        <br>

        <a href="/student_portal"
           class="btn">
            Back to Portal
        </a>

    </div>

</div>

<script>

let locationCaptured = false;

function captureLocation(){

    if(!navigator.geolocation){

        document.getElementById(
            "locationStatus"
        ).innerHTML =
            "❌ GPS not supported";

        return;
    }

    document.getElementById(
        "locationStatus"
    ).innerHTML =
        "📍 Requesting location permission...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            document.getElementById(
                "student_latitude"
            ).value =
                position.coords.latitude;

            document.getElementById(
                "student_longitude"
            ).value =
                position.coords.longitude;

            locationCaptured = true;

            document.getElementById(
                "locationStatus"
            ).innerHTML =
                "✅ Location captured successfully";

            document.getElementById(
                "locationStatus"
            ).className =
                "status success";

            enableSubmit();

        },

        function(error){

            document.getElementById(
                "locationStatus"
            ).innerHTML =
                "❌ Please allow location permission";

            document.getElementById(
                "locationStatus"
            ).className =
                "status error";

        }

    );

}

function enableSubmit(){

    if(locationCaptured){

        const btn =
            document.getElementById(
                "submitBtn"
            );

        if(btn){

            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";

        }

    }

}

const expiry =
    new Date(
        "{{ expires_at }}"
    ).getTime();

setInterval(function(){

    const now =
        new Date().getTime();

    const distance =
        expiry - now;

    if(distance < 0){

        document.getElementById(
            "timer"
        ).innerHTML =
            "🔴 QR Expired";

        return;
    }

    const minutes =
        Math.floor(
            (distance % (1000 * 60 * 60))
            / (1000 * 60)
        );

    const seconds =
        Math.floor(
            (distance % (1000 * 60))
            / 1000
        );

    let text =
        "⏳ " +
        minutes +
        "m " +
        seconds +
        "s remaining";

    if(distance < 60000){

        text =
            "⚠ Expiring Soon: " +
            minutes +
            "m " +
            seconds +
            "s";

    }

    document.getElementById(
        "timer"
    ).innerHTML =
        text;

},1000);

</script>

</body>
</html>
